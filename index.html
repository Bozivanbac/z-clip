        // Hàm tự động phát hiện khu vực của khách truy cập để bật ngôn ngữ thích hợp
        function autoDetectLanguage() {
            let browserLang = navigator.language || navigator.userLanguage;
            let code = browserLang.split('-')[0]; // Tách lấy mã ví dụ 'vi', 'zh', 'en'
            const supportedLangs = ['vi', 'en', 'zh', 'th', 'km', 'lo', 'ru', 'es', 'id'];
            
            if (!supportedLangs.includes(code)) code = 'en'; // Nếu nước lạ quá thì ưu tiên tiếng Anh
            
            document.getElementById('lang-selector').value = code;
            changeLanguage(code);
        }

        function changeLanguage(code) {
            let langData = languages[code] || languages['en'];
            document.querySelectorAll('[data-lang]').forEach(el => {
                let key = el.getAttribute('data-lang');
                if (langData[key]) {
                    if (el.tagName === 'INPUT') el.placeholder = langData[key];
                    else el.innerText = langData[key];
                }
            });
        }
        window.addEventListener('DOMContentLoaded', autoDetectLanguage);

        // 3. LOGIC CHUYỂN TAB ĐIỀU HƯỚNG
        function switchTab(tabName) {
            document.querySelectorAll('.tab-view').forEach(view => view.classList.remove('active'));
            document.querySelectorAll('[id^="nav-"]').forEach(btn => btn.classList.remove('nav-active'));
            
            document.getElementById(`view-${tabName}`).classList.add('active');
            document.getElementById(`nav-${tabName}`).classList.add('nav-active');
            
            const mainVideo = document.querySelector('#view-home video');
            if(tabName !== 'home') mainVideo.pause(); else mainVideo.play();
        }

        // 4. KIỂM TRA ĐỔI BIỆT DANH CHẶN 12 NGÀY CHÍNH XÁC
        let currentUserData = null;

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('auth-box').style.display = 'none';
                document.getElementById('user-id').innerText = `ID CỐ ĐỊNH: ${user.uid}`;
                
                db.collection('users').doc(user.uid).get().then(doc => {
                    if (doc.exists) {
                        currentUserData = doc.data();
                        document.getElementById('user-nickname').innerText = currentUserData.nickname || "Người dùng ẩn danh";
                    } else {
                        let defaultData = { nickname: "Người Dùng Mới", lastUpdate: null };
                        db.collection('users').doc(user.uid).set(defaultData);
                        currentUserData = defaultData;
                        document.getElementById('user-nickname').innerText = defaultData.nickname;
                    }
                });
            }
        });

        function updateNickname() {
            const newName = document.getElementById('new-nickname').value.trim();
            const msgEl = document.getElementById('nickname-msg');
            if(!auth.currentUser) { alert("Vui lòng kết nối tài khoản trước!"); return; }
            if(!newName) return;

            const now = new Date();
            if (currentUserData && currentUserData.lastUpdate) {
                const lastDate = currentUserData.lastUpdate.toDate();
                const diffTime = Math.abs(now - lastDate);
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));
                
                if (diffDays <= 12) {
                    msgEl.className = "text-xs text-red-500 font-semibold mt-1";
                    msgEl.innerText = `Chặn quyền! Bạn cần đợi thêm ${12 - diffDays + 1} ngày nữa để đổi tên tiếp.`;
                    return;
                }
            }

            db.collection('users').doc(auth.currentUser.uid).update({
                nickname: newName,
                lastUpdate: firebase.firestore.Timestamp.fromDate(now)
            }).then(() => {
                document.getElementById('user-nickname').innerText = newName;
                msgEl.className = "text-xs text-green-500 font-semibold mt-1";
                msgEl.innerText = "Cập nhật biệt danh thành công!";
                currentUserData.lastUpdate = firebase.firestore.Timestamp.fromDate(now);
            }).catch(err => {
                msgEl.innerText = "Lỗi kết nối database: " + err.message;
            });
        }

        // 5. GIẢ LẬP GHI ÂM LỒNG TIẾNG (VOICEOVER) TRÊN TRÌNH DUYỆT
        let mediaRecorder;
        let audioChunks = [];
        const recordBtn = document.getElementById('btn-record');
        const audioPreview = document.getElementById('voice-preview');

        recordBtn.addEventListener('click', async () => {
            if (mediaRecorder && mediaRecorder.state === "recording") {
                mediaRecorder.stop();
                recordBtn.innerText = "Bắt đầu thu âm";
                recordBtn.className = "bg-red-600 px-4 py-2 rounded-xl text-xs font-bold transition active:scale-95";
            } else {
                audioChunks = [];
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                    mediaRecorder = new MediaRecorder(stream);
                    mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
                    mediaRecorder.onstop = () => {
                        const audioBlob = new Blob(audioChunks, { type: 'audio/mp3' });
                        audioPreview.src = URL.createObjectURL(audioBlob);
                        audioPreview.classList.remove('hidden');
                    };
                    mediaRecorder.start();
                    recordBtn.innerText = "🛑 Đang thu âm... Ấn để dừng";
                    recordBtn.className = "bg-green-600 px-4 py-2 rounded-xl text-xs font-bold transition active:scale-95";
                } catch (err) {
                    alert("Ứng dụng cần quyền truy cập Micro của bạn để tiến hành lồng tiếng!");
                }
            }
        });

        // 6. PHƯƠNG THỨC ĐĂNG NHẬP MẪU
        function loginWithGoogle() {
            const provider = new firebase.auth.GoogleAuthProvider();
            auth.signInWithPopup(provider).catch(err => alert("Lỗi đăng nhập: " + err.message));
        }

        function loginWithPhone() {
            alert("Tính năng gửi OTP qua SMS đang cấu hình gói trả phí trên Firebase của bạn.");
        }

        // 7. KÍCH HOẠT PWA SERVICE WORKER RUNTIME
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js').catch(err => console.log(err));
        }
    </script>
