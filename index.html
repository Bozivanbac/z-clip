<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Premium Game Shop</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Tiêu đề & Thanh điều hướng -->
    <div class="shop-header">
        <h1>VẬT PHẨM ĐỘC QUYỀN</h1>
        <p>Ưu đãi giới hạn dành riêng cho chiến thần</p>
        <header class="shop-nav">
            <button class="nav-item active">Gói Sapphire</button>
            <button class="nav-item">Rương Thần Bí</button>
            <button class="nav-item">Quà Mỗi Ngày</button>
        </header>
    </div>

    <!-- Danh sách vật phẩm -->
    <main class="shop-container">
        
        <!-- Gói 1 -->
        <div class="product-card">
            <div class="badge">Bán chạy</div>
            <div class="product-image">💎</div>
            <h3 class="product-name">200 Sapphire</h3>
            <div class="price-tag">79.000 đ</div>
            <button class="buy-button">MUA NGAY</button>
        </div>

        <!-- Gói 2 -->
        <div class="product-card hot">
            <div class="badge hot-badge">+10% BONUS</div>
            <div class="product-image">🔮</div>
            <h3 class="product-name">1,000 + 100 <span class="highlight">Sapphire</span></h3>
            <div class="price-tag">249.000 đ</div>
            <button class="buy-button">MUA NGAY</button>
        </div>

        <!-- Gói 3 -->
        <div class="product-card">
            <div class="badge">Ưu đãi</div>
            <div class="product-image">🏺</div>
            <h3 class="product-name">3,500 + 500 Sapphire</h3>
            <div class="price-tag">799.000 đ</div>
            <button class="buy-button">MUA NGAY</button>
        </div>

        <!-- Gói 4 -->
        <div class="product-card vip">
            <div class="badge vip-badge">SIÊU CẤP</div>
            <div class="product-image">👑</div>
            <h3 class="product-name">11,500 + 2,500 Sapphire</h3>
            <div class="price-tag">2.499.000 đ</div>
            <button class="buy-button">MUA NGAY</button>
        </div>

    </main>

</body>
</html>
