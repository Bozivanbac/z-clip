<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng Vật Phẩm Demo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Thanh Menu Danh Mục -->
    <header class="shop-nav">
        <button class="nav-item active">Gói Vật Phẩm</button>
        <button class="nav-item">Quà Mỗi Ngày</button>
        <button class="nav-item">Rương Thần Bí</button>
        <button class="nav-item">Ưu Đãi Đặc Biệt</button>
    </header>

    <!-- Khu Vực Hiển Thị Vật Phẩm (Dạng Lưới) -->
    <main class="shop-container">
        
        <!-- Vật phẩm 1 -->
        <div class="product-card">
            <div class="product-image">
                <span class="placeholder-icon">💎</span>
            </div>
            <h3 class="product-name">200 Đá Quý</h3>
            <button class="buy-button">79.000 đ</button>
        </div>

        <!-- Vật phẩm 2 -->
        <div class="product-card">
            <div class="product-image">
                <span class="placeholder-icon">💎💎</span>
            </div>
            <h3 class="product-name">1000 + 100 Đá Quý</h3>
            <button class="buy-button">249.000 đ</button>
        </div>

        <!-- Vật phẩm 3 -->
        <div class="product-card">
            <div class="product-image">
                <span class="placeholder-icon">🏺</span>
            </div>
            <h3 class="product-name">3500 + 500 Đá Quý</h3>
            <button class="buy-button">799.000 đ</button>
        </div>

        <!-- Vật phẩm 4 -->
        <div class="product-card">
            <div class="product-image">
                <span class="placeholder-icon">💰</span>
            </div>
            <h3 class="product-name">11500 + 2500 Đá Quý</h3>
            <button class="buy-button">2.499.000 đ</button>
        </div>

    </main>

</body>
</html>
