<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gói Mua Một Lần</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="shop-wrapper">
        <!-- Tiêu đề phân khu -->
        <div class="section-title">Gói mua một lần</div>

        <!-- Vùng chứa các gói ưu đãi -->
        <main class="bundle-container">
            
            <!-- GÓI 1 -->
            <div class="bundle-card">
                <!-- Nhãn giảm giá góc trên -->
                <div class="discount-header">
                    <span class="time-tag">🕒 -50%</span>
                    <span class="percent-tag">50% <small>OFF</small></span>
                </div>

                <!-- Hình ảnh rương báu chính -->
                <div class="main-chest">🎁</div>

                <!-- Tên gói -->
                <h3 class="bundle-name">Gói ưu đãi đặc biệt chỉ có một lần</h3>

                <!-- Hàng vật phẩm nhỏ đi kèm -->
                <div class="sub-items-list">
                    <div class="sub-item">⚔️<span>x1</span></div>
                    <div class="sub-item">🛡️<span>x1</span></div>
                    <div class="sub-item">💎<span>x3</span></div>
                    <div class="sub-item">🧪<span>x3</span></div>
                </div>

                <!-- Khối thanh toán (Giá cũ gạch ngang + Giá mới + Nút mua) -->
                <div class="purchase-action">
                    <div class="price-box">
                        <span class="new-price">249.500 đ</span>
                        <span class="old-price">499.000 đ</span>
                    </div>
                    <button class="cart-btn">🛒</button>
                </div>

                <!-- Dòng giới hạn mua -->
                <div class="stock-info">Còn hàng: 1/1</div>
            </div>

            <!-- GÓI 2 -->
            <div class="bundle-card">
                <div class="discount-header">
                    <span class="time-tag">🕒 -60%</span>
                    <span class="percent-tag">60% <small>OFF</small></span>
                </div>
                <div class="main-chest">👑</div>
                <h3 class="bundle-name">Gói mua một lần Spirit Vanna</h3>
                <div class="sub-items-list">
                    <div class="sub-item">📜<span>x1</span></div>
                    <div class="sub-item">🏺<span>x2</span></div>
                    <div class="sub-item">💰<span>x10</span></div>
                </div>
                <div class="purchase-action">
                    <div class="price-box">
                        <span class="new-price">519.600 đ</span>
                        <span class="old-price">1.299.000 đ</span>
                    </div>
                    <button class="cart-btn">🛒</button>
                </div>
                <div class="stock-info">Còn hàng: 1/1</div>
            </div>

        </main>
    </div>

</body>
</html>
